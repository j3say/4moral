# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter_native_splash:
  color: "#ffffff"
  image: assets/moral1_logo.png
  android_gravity: center
  ios_content_mode: center
  fullscreen: true

  android: true
  ios: true

  # 👇 Add theme-aware colors
  color_dark: "#000000"         # Dark theme background
  image_dark: assets/moral1_logo.png   # Optional dark theme logo


# flutter pub run flutter_launcher_icons:main
flutter_icons:
  android: "app_logo"
  ios: true
  image_path: "assets/moral1_logo.png"
  remove_alpha_ios: true


flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/group/
    - assets/location_icon.png
    - assets/destination_icon.png

  fonts:
    - family: Poppins
      fonts:
        - asset: fonts/Poppins-Regular.ttf
        - asset: fonts/Poppins-Medium.ttf
          weight: 400
        - asset: fonts/Poppins-MediumItalic.ttf
          weight: 400
          style: italic
        - asset: fonts/Poppins-SemiBold.ttf
          weight: 500
        - asset: fonts/Poppins-SemiBoldItalic.ttf
          weight: 500
          style: italic
        - asset: fonts/Poppins-Bold.ttf
          weight: 600
        - asset: fonts/Poppins-BoldItalic.ttf
          weight: 600
          style: italic
          
    - family: Righteous
      fonts:
        - asset: fonts/Righteous-Regular.ttf
       